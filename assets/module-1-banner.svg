<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="720" height="320">
<!-- Module 1 — Strings, hashes & key namespaces. Cyan accent (#00b8d9).
     Visual: SET/GET round-trip + HASH structure + namespaced key. -->

<defs>
  <style>
    .h { font-family: 'Segoe UI', sans-serif; }
    .m { font-family: 'Cascadia Code', 'Fira Code', monospace; }
    .label { font-family: 'Segoe UI', sans-serif; letter-spacing: 0.10em; }
  </style>
  <radialGradient id="bg-m1" cx="30%" cy="30%" r="90%">
    <stop offset="0%" stop-color="#1a2540"/>
    <stop offset="100%" stop-color="#0e1726"/>
  </radialGradient>
  <linearGradient id="accent-m1" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#00b8d9" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#a5d6ff" stop-opacity="0.85"/>
  </linearGradient>
</defs>

<rect width="720" height="320" fill="url(#bg-m1)"/>
<rect x="0" y="0" width="720" height="4" fill="url(#accent-m1)"/>
<rect x="0" y="0" width="6" height="320" fill="#00b8d9"/>

<g class="h">
  <text x="32" y="56" font-size="14" letter-spacing="0.16em" font-weight="700" fill="#00b8d9">MODULE 1 · 5 LESSONS</text>
  <text x="32" y="98" font-size="30" font-weight="700" fill="#eeeeee">Strings, Hashes</text>
  <text x="32" y="132" font-size="30" font-weight="700" fill="#eeeeee">&amp; Key Namespaces</text>
  <text x="32" y="166" font-size="14" fill="#a5d6ff" letter-spacing="0.05em">SET · GET · INCR · GETEX · HSET · HEXPIRE · typed key newtypes</text>
</g>

<g id="m1-keyvalue" transform="translate(420, 50)">
  <rect x="0" y="0" width="270" height="96" rx="8" fill="#0e1726" stroke="#00b8d9" stroke-width="2.5"/>
  <rect x="0" y="0" width="270" height="24" rx="8" fill="#1a1d23"/>
  <text x="14" y="18" class="m" font-size="12" font-weight="700" fill="#00b8d9">SET / GET</text>
  <text x="16" y="48" class="m" font-size="13" fill="#a5d6ff">SET session:42 "alice"</text>
  <text x="16" y="68" class="m" font-size="13" fill="#7ee787">GET session:42</text>
  <text x="16" y="88" class="m" font-size="13" fill="#eeeeee">→ "alice"</text>
</g>

<g id="m1-hash" transform="translate(420, 165)">
  <rect x="0" y="0" width="270" height="120" rx="8" fill="#0e1726" stroke="#00b8d9" stroke-width="2.5"/>
  <rect x="0" y="0" width="270" height="24" rx="8" fill="#1a1d23"/>
  <text x="14" y="18" class="m" font-size="12" font-weight="700" fill="#00b8d9">HASH user:42</text>
  <text x="16" y="48" class="m" font-size="13" fill="#a5d6ff">first_name → "Alice"</text>
  <text x="16" y="68" class="m" font-size="13" fill="#a5d6ff">last_name  → "Liddell"</text>
  <text x="16" y="88" class="m" font-size="13" fill="#a5d6ff">credits    → "19"</text>
  <text x="16" y="108" class="m" font-size="11" fill="#7ee787">HEXPIRE first_name 30s</text>
</g>

<g id="capstone-m1" transform="translate(32, 210)">
  <rect x="0" y="0" width="360" height="68" rx="6" fill="#161b22" stroke="#7ee787" stroke-width="1.5" fill-opacity="0.6"/>
  <text x="14" y="22" class="label" font-size="11" font-weight="700" fill="#7ee787">MINI-CAPSTONE</text>
  <text x="14" y="44" class="m" font-size="13" fill="#eeeeee">axum middleware + session:{id} hashes</text>
  <text x="14" y="60" class="m" font-size="13" fill="#a5d6ff">30-minute sliding TTL · typed key newtypes</text>
</g>
</svg>
