<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="720" height="320">
<!-- Module 2 — Lists, sets, sorted sets & leaderboards. Orange accent (#ffab00). -->

<defs>
  <style>
    .h { font-family: 'Segoe UI', sans-serif; }
    .m { font-family: 'Cascadia Code', 'Fira Code', monospace; }
    .label { font-family: 'Segoe UI', sans-serif; letter-spacing: 0.10em; }
  </style>
  <radialGradient id="bg-m2" cx="30%" cy="30%" r="90%">
    <stop offset="0%" stop-color="#1a2540"/>
    <stop offset="100%" stop-color="#0e1726"/>
  </radialGradient>
  <linearGradient id="accent-m2" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ffab00" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#ffe125" stop-opacity="0.85"/>
  </linearGradient>
</defs>

<rect width="720" height="320" fill="url(#bg-m2)"/>
<rect x="0" y="0" width="720" height="4" fill="url(#accent-m2)"/>
<rect x="0" y="0" width="6" height="320" fill="#ffab00"/>

<g class="h">
  <text x="32" y="56" font-size="14" letter-spacing="0.16em" font-weight="700" fill="#ffab00">MODULE 2 · 5 LESSONS</text>
  <text x="32" y="98" font-size="30" font-weight="700" fill="#eeeeee">Lists, Sets,</text>
  <text x="32" y="132" font-size="30" font-weight="700" fill="#eeeeee">Sorted Sets &amp; ZSets</text>
  <text x="32" y="166" font-size="14" fill="#ffe9a0" letter-spacing="0.05em">LPUSH · BRPOP · SADD · ZADD · ZRANGEBYSCORE</text>
</g>

<g id="m2-leaderboard" transform="translate(420, 50)">
  <rect x="0" y="0" width="270" height="160" rx="8" fill="#0e1726" stroke="#ffab00" stroke-width="2.5"/>
  <rect x="0" y="0" width="270" height="24" rx="8" fill="#1a1d23"/>
  <text x="14" y="18" class="m" font-size="12" font-weight="700" fill="#ffab00">ZSET trending:products</text>
  <line x1="14" y1="40" x2="256" y2="40" stroke="#ffab00" stroke-width="0.8" opacity="0.4"/>
  <text x="16" y="62" class="m" font-size="13" fill="#ffe9a0">1. iPhone-15      score=8421</text>
  <text x="16" y="82" class="m" font-size="13" fill="#ffe9a0">2. AirPods-Pro    score=6109</text>
  <text x="16" y="102" class="m" font-size="13" fill="#ffe9a0">3. MacBook-Air    score=4830</text>
  <text x="16" y="122" class="m" font-size="13" fill="#ffe9a0">4. iPad-Pro       score=3211</text>
  <text x="16" y="142" class="m" font-size="11" fill="#7ee787">ZRANGEBYSCORE … LIMIT 0 10</text>
</g>

<g id="m2-ratelimit" transform="translate(420, 230)">
  <rect x="0" y="0" width="270" height="60" rx="8" fill="#0e1726" stroke="#ffab00" stroke-width="2.5"/>
  <text x="14" y="22" class="m" font-size="12" font-weight="700" fill="#ffab00">SLIDING WINDOW</text>
  <text x="14" y="44" class="m" font-size="12" fill="#ffe9a0">ZADD rl:ip · ZREMRANGEBYSCORE 60s</text>
</g>

<g id="capstone-m2" transform="translate(32, 210)">
  <rect x="0" y="0" width="360" height="68" rx="6" fill="#161b22" stroke="#7ee787" stroke-width="1.5" fill-opacity="0.6"/>
  <text x="14" y="22" class="label" font-size="11" font-weight="700" fill="#7ee787">MINI-CAPSTONE</text>
  <text x="14" y="44" class="m" font-size="13" fill="#eeeeee">axum API rate-limiter middleware</text>
  <text x="14" y="60" class="m" font-size="13" fill="#ffe9a0">per-IP sliding window · sorted-set windows</text>
</g>
</svg>
