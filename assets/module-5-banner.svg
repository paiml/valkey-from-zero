<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="720" height="320">
<!-- Module 5 — Operations: persistence, replication & Sentinel. Red-pink accent. -->

<defs>
  <style>
    .h { font-family: 'Segoe UI', sans-serif; }
    .m { font-family: 'Cascadia Code', 'Fira Code', monospace; }
    .label { font-family: 'Segoe UI', sans-serif; letter-spacing: 0.10em; }
  </style>
  <radialGradient id="bg-m5" cx="30%" cy="30%" r="90%">
    <stop offset="0%" stop-color="#1a2540"/>
    <stop offset="100%" stop-color="#0e1726"/>
  </radialGradient>
  <linearGradient id="accent-m5" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#ff5630" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#ffab00" stop-opacity="0.85"/>
  </linearGradient>
</defs>

<rect width="720" height="320" fill="url(#bg-m5)"/>
<rect x="0" y="0" width="720" height="4" fill="url(#accent-m5)"/>
<rect x="0" y="0" width="6" height="320" fill="#ff5630"/>

<g class="h">
  <text x="32" y="56" font-size="14" letter-spacing="0.16em" font-weight="700" fill="#ff5630">MODULE 5 · 5 LESSONS · OPS</text>
  <text x="32" y="98" font-size="30" font-weight="700" fill="#eeeeee">Persistence, Replicas</text>
  <text x="32" y="132" font-size="30" font-weight="700" fill="#eeeeee">&amp; Sentinel</text>
  <text x="32" y="166" font-size="14" fill="#ffe9a0" letter-spacing="0.05em">RDB · AOF · replicaof · Sentinel · CLUSTER · WAIT</text>
</g>

<g id="m5-sentinel" transform="translate(420, 50)">
  <rect x="0" y="0" width="270" height="160" rx="8" fill="#0e1726" stroke="#ff5630" stroke-width="2.5"/>
  <rect x="0" y="0" width="270" height="24" rx="8" fill="#1a1d23"/>
  <text x="14" y="18" class="m" font-size="11" font-weight="700" fill="#ff5630">SENTINEL · 3-node quorum</text>

  <circle cx="60" cy="80" r="22" fill="#0e1726" stroke="#7ee787" stroke-width="2.5"/>
  <text x="60" y="74" text-anchor="middle" class="m" font-size="10" fill="#7ee787">P</text>
  <text x="60" y="86" text-anchor="middle" class="m" font-size="9" fill="#7ee787">primary</text>

  <circle cx="135" cy="80" r="22" fill="#0e1726" stroke="#00b8d9" stroke-width="2"/>
  <text x="135" y="74" text-anchor="middle" class="m" font-size="10" fill="#a5d6ff">R</text>
  <text x="135" y="86" text-anchor="middle" class="m" font-size="9" fill="#a5d6ff">replica</text>

  <circle cx="210" cy="80" r="22" fill="#0e1726" stroke="#00b8d9" stroke-width="2"/>
  <text x="210" y="74" text-anchor="middle" class="m" font-size="10" fill="#a5d6ff">R</text>
  <text x="210" y="86" text-anchor="middle" class="m" font-size="9" fill="#a5d6ff">replica</text>

  <line x1="80" y1="80" x2="115" y2="80" stroke="#00b8d9" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="155" y1="80" x2="190" y2="80" stroke="#00b8d9" stroke-width="1.5" stroke-dasharray="3,2"/>

  <text x="135" y="124" text-anchor="middle" class="m" font-size="10" fill="#ff5630">⚡ kill primary → election</text>
  <text x="135" y="142" text-anchor="middle" class="m" font-size="10" fill="#ffab00">replica promoted in ~5s</text>
</g>

<g id="m5-persist" transform="translate(420, 230)">
  <rect x="0" y="0" width="270" height="60" rx="8" fill="#0e1726" stroke="#ff5630" stroke-width="2.5"/>
  <text x="14" y="22" class="m" font-size="11" font-weight="700" fill="#ff5630">PERSISTENCE</text>
  <text x="14" y="42" class="m" font-size="11" fill="#ffe9a0">RDB snapshot (loose) · AOF (strict)</text>
  <text x="14" y="56" class="m" font-size="11" fill="#a5d6ff">choose: data loss budget vs throughput</text>
</g>

<g id="capstone-m5" transform="translate(32, 210)">
  <rect x="0" y="0" width="360" height="78" rx="6" fill="#161b22" stroke="#ff5630" stroke-width="1.5" fill-opacity="0.6"/>
  <text x="14" y="22" class="label" font-size="11" font-weight="700" fill="#ff5630">TWO-TRACK</text>
  <text x="14" y="42" class="m" font-size="13" fill="#eeeeee">lab: reading + recorded demo</text>
  <text x="14" y="58" class="m" font-size="13" fill="#ffe9a0">repo: compose.cluster.yml · 3-node Sentinel</text>
  <text x="14" y="74" class="m" font-size="11" fill="#7ee787">kill primary mid-write → observe failover</text>
</g>
</svg>
