<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" width="720" height="320">
<!-- Module 3 — Streams, consumer groups & XREADGROUP. Green accent (#7ee787).
     The data-engineering CORE of the course. -->

<defs>
  <style>
    .h { font-family: 'Segoe UI', sans-serif; }
    .m { font-family: 'Cascadia Code', 'Fira Code', monospace; }
    .label { font-family: 'Segoe UI', sans-serif; letter-spacing: 0.10em; }
  </style>
  <radialGradient id="bg-m3" cx="30%" cy="30%" r="90%">
    <stop offset="0%" stop-color="#1a2540"/>
    <stop offset="100%" stop-color="#0e1726"/>
  </radialGradient>
  <linearGradient id="accent-m3" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#7ee787" stop-opacity="0.95"/>
    <stop offset="100%" stop-color="#36b37e" stop-opacity="0.85"/>
  </linearGradient>
  <marker id="m3-arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
    <path d="M 0 0 L 9 5 L 0 10 Z" fill="#7ee787"/>
  </marker>
</defs>

<rect width="720" height="320" fill="url(#bg-m3)"/>
<rect x="0" y="0" width="720" height="4" fill="url(#accent-m3)"/>
<rect x="0" y="0" width="6" height="320" fill="#7ee787"/>

<g class="h">
  <text x="32" y="56" font-size="14" letter-spacing="0.16em" font-weight="700" fill="#7ee787">MODULE 3 · 5 LESSONS · THE CORE</text>
  <text x="32" y="98" font-size="30" font-weight="700" fill="#eeeeee">Streams &amp;</text>
  <text x="32" y="132" font-size="30" font-weight="700" fill="#eeeeee">Consumer Groups</text>
  <text x="32" y="166" font-size="14" fill="#7ee787" letter-spacing="0.05em">XADD · XREADGROUP · XACK · XPENDING · XCLAIM</text>
</g>

<g id="m3-flow" transform="translate(32, 200)">
  <rect x="0" y="0" width="80" height="40" rx="4" fill="#0e1726" stroke="#9c84ff" stroke-width="2"/>
  <text x="40" y="25" text-anchor="middle" class="m" font-size="11" font-weight="700" fill="#b8acff">XADD</text>
  <line x1="86" y1="20" x2="120" y2="20" stroke="#7ee787" stroke-width="2" marker-end="url(#m3-arrow)"/>
  <rect x="124" y="0" width="120" height="40" rx="4" fill="#0e1726" stroke="#7ee787" stroke-width="2.5"/>
  <text x="184" y="18" text-anchor="middle" class="m" font-size="11" font-weight="700" fill="#7ee787">orders:stream</text>
  <text x="184" y="32" text-anchor="middle" class="m" font-size="9" fill="#a5d6ff">XREADGROUP</text>
  <line x1="248" y1="20" x2="270" y2="20" stroke="#7ee787" stroke-width="2" marker-end="url(#m3-arrow)"/>
  <g id="cg" transform="translate(280, -20)">
    <text x="40" y="6" text-anchor="middle" class="label" font-size="9" font-weight="700" fill="#7ee787">CG: workers</text>
    <rect x="0" y="14" width="80" height="22" rx="3" fill="#0e1726" stroke="#00b8d9" stroke-width="1.5"/>
    <text x="40" y="29" text-anchor="middle" class="m" font-size="10" fill="#a5d6ff">w1 · XACK</text>
    <rect x="0" y="40" width="80" height="22" rx="3" fill="#0e1726" stroke="#00b8d9" stroke-width="1.5"/>
    <text x="40" y="55" text-anchor="middle" class="m" font-size="10" fill="#a5d6ff">w2 · XACK</text>
    <rect x="0" y="66" width="80" height="22" rx="3" fill="#0e1726" stroke="#00b8d9" stroke-width="1.5"/>
    <text x="40" y="81" text-anchor="middle" class="m" font-size="10" fill="#a5d6ff">w3 · XACK</text>
  </g>
</g>

<g id="m3-pel" transform="translate(490, 200)">
  <rect x="0" y="0" width="200" height="88" rx="6" fill="#0e1726" stroke="#ff5630" stroke-width="2" fill-opacity="0.8"/>
  <rect x="0" y="0" width="200" height="22" rx="6" fill="#1a1d23"/>
  <text x="14" y="16" class="m" font-size="11" font-weight="700" fill="#ff5630">PEL · XPENDING</text>
  <text x="14" y="42" class="m" font-size="11" fill="#ffab00">id=1715284-0  worker=w2</text>
  <text x="14" y="60" class="m" font-size="11" fill="#ffab00">id=1715287-0  worker=w1</text>
  <text x="14" y="78" class="m" font-size="10" fill="#7ee787">XCLAIM after 5s idle → DLQ</text>
</g>

<g id="capstone-m3" transform="translate(420, 20)">
  <rect x="0" y="0" width="270" height="100" rx="6" fill="#161b22" stroke="#7ee787" stroke-width="2" fill-opacity="0.6"/>
  <text x="14" y="22" class="label" font-size="11" font-weight="700" fill="#7ee787">MINI-CAPSTONE — THE SHOWPIECE</text>
  <text x="14" y="46" class="m" font-size="12" fill="#eeeeee">CSV → XADD → CG[3] → sqlx</text>
  <text x="14" y="64" class="m" font-size="12" fill="#a5d6ff">XACK only after Postgres commit</text>
  <text x="14" y="86" class="m" font-size="11" fill="#7ee787">5th contract: XACK-after-commit</text>
</g>
</svg>
