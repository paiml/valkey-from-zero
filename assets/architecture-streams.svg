<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" width="1200" height="480">
<!-- Module 3 / course-capstone deep-dive: full XADD → consumer-group → sqlx
     pipeline showing the exactly-once contract (XACK gated on Postgres
     commit). -->

<defs>
  <style>
    .h { font-family: 'Segoe UI', sans-serif; }
    .m { font-family: 'Cascadia Code', 'Fira Code', monospace; }
    .label { font-family: 'Segoe UI', sans-serif; letter-spacing: 0.10em; }
  </style>
  <radialGradient id="bg" cx="50%" cy="40%" r="80%">
    <stop offset="0%" stop-color="#1a2540"/>
    <stop offset="100%" stop-color="#0e1726"/>
  </radialGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#9c84ff" stop-opacity="0.85"/>
    <stop offset="50%" stop-color="#7ee787" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="#00b8d9" stop-opacity="0.85"/>
  </linearGradient>
  <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
    <path d="M 0 0 L 12 7 L 0 14 Z" fill="#7ee787"/>
  </marker>
  <marker id="arrow-ack" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
    <path d="M 0 0 L 12 7 L 0 14 Z" fill="#00b8d9"/>
  </marker>
</defs>

<rect width="1200" height="480" fill="url(#bg)"/>
<rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

<g class="h">
  <text x="40" y="48" font-size="14" letter-spacing="0.16em" font-weight="700" fill="#7ee787">MODULE 3 — STREAMS · CONSUMER GROUPS · EXACTLY-ONCE</text>
  <text x="40" y="84" font-size="28" font-weight="700" fill="#eeeeee">XADD → consumer-group(3 workers) → sqlx → Postgres</text>
  <text x="40" y="110" font-size="14" fill="#a5d6ff" letter-spacing="0.05em">XACK only fires after a successful Postgres commit. Failure → entry stays in the PEL → XCLAIM after idle → DLQ.</text>
</g>

<g id="producer" transform="translate(40, 200)">
  <rect x="0" y="0" width="160" height="140" rx="8" fill="#0e1726" stroke="#9c84ff" stroke-width="2.5"/>
  <rect x="0" y="0" width="160" height="32" rx="8" fill="#1a1d23"/>
  <text x="80" y="22" text-anchor="middle" class="m" font-size="13" font-weight="700" fill="#9c84ff">Producer (CSV)</text>
  <text x="80" y="64" text-anchor="middle" class="m" font-size="13" fill="#b8acff">XADD orders:in</text>
  <text x="80" y="84" text-anchor="middle" class="m" font-size="12" fill="#a5d6ff">customer_id ...</text>
  <text x="80" y="104" text-anchor="middle" class="m" font-size="12" fill="#a5d6ff">amount ...</text>
  <text x="80" y="128" text-anchor="middle" class="label" font-size="11" font-weight="700" fill="#9c84ff">RUST · redis-rs</text>
</g>
<line x1="200" y1="270" x2="290" y2="270" stroke="#7ee787" stroke-width="3" marker-end="url(#arrow)"/>

<g id="stream" transform="translate(290, 200)">
  <rect x="0" y="0" width="200" height="140" rx="8" fill="#0e1726" stroke="#7ee787" stroke-width="3"/>
  <rect x="0" y="0" width="200" height="32" rx="8" fill="#1a1d23"/>
  <text x="100" y="22" text-anchor="middle" class="m" font-size="13" font-weight="700" fill="#7ee787">orders:in (STREAM)</text>
  <line x1="14" y1="48" x2="186" y2="48" stroke="#7ee787" stroke-width="0.8" opacity="0.4"/>
  <text x="14" y="68" class="m" font-size="11" fill="#a5d6ff">1715284-0  cust=148</text>
  <text x="14" y="84" class="m" font-size="11" fill="#a5d6ff">1715287-0  cust=526</text>
  <text x="14" y="100" class="m" font-size="11" fill="#a5d6ff">1715291-0  cust=236</text>
  <text x="14" y="116" class="m" font-size="11" fill="#7ee787">XREADGROUP COUNT 10</text>
  <text x="100" y="132" text-anchor="middle" class="label" font-size="10" font-weight="700" fill="#7ee787">CG: workers</text>
</g>
<line x1="490" y1="270" x2="580" y2="270" stroke="#7ee787" stroke-width="3" marker-end="url(#arrow)"/>

<g id="workers" transform="translate(580, 180)">
  <text x="80" y="-4" text-anchor="middle" class="label" font-size="11" font-weight="700" fill="#00b8d9">3 CONSUMERS</text>
  <rect x="0" y="0" width="160" height="50" rx="6" fill="#0e1726" stroke="#00b8d9" stroke-width="2"/>
  <text x="80" y="20" text-anchor="middle" class="m" font-size="12" font-weight="700" fill="#a5d6ff">worker-1</text>
  <text x="80" y="38" text-anchor="middle" class="m" font-size="11" fill="#a5d6ff">processing 1715284-0</text>

  <rect x="0" y="60" width="160" height="50" rx="6" fill="#0e1726" stroke="#00b8d9" stroke-width="2"/>
  <text x="80" y="80" text-anchor="middle" class="m" font-size="12" font-weight="700" fill="#a5d6ff">worker-2</text>
  <text x="80" y="98" text-anchor="middle" class="m" font-size="11" fill="#a5d6ff">processing 1715287-0</text>

  <rect x="0" y="120" width="160" height="50" rx="6" fill="#0e1726" stroke="#00b8d9" stroke-width="2"/>
  <text x="80" y="140" text-anchor="middle" class="m" font-size="12" font-weight="700" fill="#a5d6ff">worker-3</text>
  <text x="80" y="158" text-anchor="middle" class="m" font-size="11" fill="#a5d6ff">processing 1715291-0</text>
</g>
<line x1="740" y1="270" x2="830" y2="270" stroke="#00b8d9" stroke-width="3" marker-end="url(#arrow-ack)"/>

<g id="postgres" transform="translate(830, 200)">
  <rect x="0" y="0" width="180" height="140" rx="8" fill="#0e1726" stroke="#00b8d9" stroke-width="3"/>
  <rect x="0" y="0" width="180" height="32" rx="8" fill="#1a1d23"/>
  <text x="90" y="22" text-anchor="middle" class="m" font-size="13" font-weight="700" fill="#00b8d9">Postgres (sqlx)</text>
  <text x="14" y="60" class="m" font-size="12" fill="#a5d6ff">INSERT INTO orders</text>
  <text x="14" y="78" class="m" font-size="12" fill="#a5d6ff">  (customer_id, amount,</text>
  <text x="14" y="94" class="m" font-size="12" fill="#a5d6ff">   stream_id) VALUES (...)</text>
  <text x="14" y="116" class="m" font-size="11" fill="#7ee787">on success → XACK</text>
  <text x="14" y="132" class="m" font-size="11" fill="#ff5630">on failure → leave in PEL</text>
</g>

<path d="M 920,200 Q 700,140 490,200" fill="none" stroke="#00b8d9" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow-ack)"/>
<text x="700" y="155" text-anchor="middle" class="m" font-size="13" font-weight="700" fill="#00b8d9">XACK orders:in workers 1715284-0</text>

<g id="dlq" transform="translate(1040, 200)">
  <rect x="0" y="0" width="140" height="140" rx="8" fill="#0e1726" stroke="#ff5630" stroke-width="2.5"/>
  <rect x="0" y="0" width="140" height="32" rx="8" fill="#1a1d23"/>
  <text x="70" y="22" text-anchor="middle" class="m" font-size="13" font-weight="700" fill="#ff5630">PEL → DLQ</text>
  <text x="70" y="58" text-anchor="middle" class="m" font-size="12" fill="#ffab00">XPENDING</text>
  <text x="70" y="78" text-anchor="middle" class="m" font-size="12" fill="#ffab00">XCLAIM &gt; 5s idle</text>
  <text x="70" y="100" text-anchor="middle" class="m" font-size="11" fill="#ffe9a0">XADD orders:dlq</text>
  <text x="70" y="124" text-anchor="middle" class="label" font-size="10" font-weight="700" fill="#ff5630">RECOVERY</text>
</g>

<g id="contract-c5" transform="translate(40, 410)">
  <rect x="0" y="0" width="1120" height="44" rx="6" fill="#161b22" stroke="#7ee787" stroke-width="2" fill-opacity="0.85"/>
  <text x="20" y="28" class="h" font-size="14" font-weight="700" fill="#7ee787">Provable contract C5 (reserved):</text>
  <text x="280" y="28" class="m" font-size="14" fill="#eeeeee">XACK fires only after the Postgres COMMIT returns success — verified by the consumer-side runtime assert in valkey-streams::process_one()</text>
</g>
</svg>
